<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Majih • Hear. Help. Heal.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; scroll-behavior: smooth; }
        .logo-font { font-family: 'Playfair Display', serif; }
        .hero-bg { background: linear-gradient(135deg, #10b981 0%, #15803d 100%); }
        .post-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden-view { display: none !important; }
        .need-btn.selected { border-color: #059669 !important; background-color: #ecfdf5 !important; }
    </style>
</head>
<body class="bg-emerald-50 text-emerald-900 min-h-screen">

    <div id="loginView" class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-emerald-100">
            <div class="bg-emerald-600 p-8 text-center text-white">
                <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-2xl font-bold mx-auto mb-4 logo-font">M</div>
                <h1 class="text-2xl font-bold">Secure Verification</h1>
                <p class="text-emerald-100 text-xs mt-2">Identity verified. Presence anonymous.</p>
            </div>
            <form id="verifyForm" class="p-8 space-y-4">
                <input type="email" id="userEmail" placeholder="Email Address" required class="w-full p-4 bg-emerald-50 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                <input type="tel" id="userPhone" placeholder="Phone (e.g. 0712...)" required class="w-full p-4 bg-emerald-50 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500">
                <div class="relative">
                    <input type="file" id="idFile" accept="image/*" class="hidden" onchange="document.getElementById('fileTxt').innerText = 'ID Loaded: ' + this.files[0].name">
                    <label for="idFile" class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-emerald-200 rounded-2xl cursor-pointer bg-emerald-50/50 hover:bg-emerald-50">
                        <i class="fas fa-id-card text-2xl text-emerald-400 mb-2"></i>
                        <span id="fileTxt" class="text-sm text-emerald-600">Upload National ID (Front)</span>
                    </label>
                </div>
                <div id="ocrStatus" class="hidden text-center text-[10px] font-bold text-emerald-600 animate-pulse uppercase">Reading ID Details...</div>
                <button type="submit" id="loginBtn" class="w-full py-4 bg-emerald-700 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
                    Verify & Enter <i class="fas fa-shield-check"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="mainView" class="hidden-view">
        <nav class="bg-white border-b border-emerald-100 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center text-white text-2xl font-bold logo-font">M</div>
                    <div>
                        <span class="text-xl md:text-3xl font-bold text-emerald-700 logo-font">The Majih</span>
                        <p class="text-[10px] text-emerald-500 -mt-1 tracking-widest">…Hear. Help. Heal…</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="handleLogout()" class="px-3 py-2 bg-red-50 text-red-600 rounded-xl text-xs font-bold flex items-center gap-2">
                        <i class="fas fa-sign-out-alt"></i> <span class="hidden md:inline">Logout</span>
                    </button>
                    <button onclick="openNewPostModal()" class="bg-emerald-600 text-white px-4 py-2 rounded-xl font-semibold flex items-center gap-2">
                        <i class="fas fa-plus"></i> <span class="hidden sm:inline">Share</span>
                    </button>
                </div>
            </div>
        </nav>

        <section class="hero-bg text-white py-12 text-center">
            <div class="max-w-3xl mx-auto px-6">
                <h1 class="text-4xl md:text-6xl font-bold logo-font mb-4">You will not suffer alone.</h1>
                <p class="text-emerald-100 mb-8">Verified safety. Anonymous community. Sacred healing.</p>
            </div>
        </section>

        <section id="feed-container" class="py-12 max-w-4xl mx-auto px-6">
            <h2 class="text-2xl font-semibold mb-8">Recent Journeys</h2>
            <div id="feed" class="space-y-6"></div>
        </section>
    </div>

    <div id="newPostModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full p-6 space-y-4">
            <h3 class="text-xl font-bold">Share Your Story</h3>
            <select id="spaceSelect" class="w-full p-3 border rounded-xl bg-emerald-50">
                <option>Grief & Loss</option>
                <option>Relationships</option>
                <option>Work & School</option>
            </select>
            <div id="needGrid" class="grid grid-cols-2 gap-2">
                <button type="button" onclick="selectNeed(this)" data-need="Listen" class="need-btn p-3 border rounded-xl text-sm bg-gray-50">🙉 Listen</button>
                <button type="button" onclick="selectNeed(this)" data-need="Advice" class="need-btn p-3 border rounded-xl text-sm bg-gray-50">💡 Advice</button>
            </div>
            <textarea id="storyText" rows="4" class="w-full p-4 border rounded-2xl resize-none" placeholder="Be open..."></textarea>
            <div class="flex gap-2">
                <button onclick="closeNewPostModal()" class="flex-1 py-3 rounded-xl border">Cancel</button>
                <button onclick="submitPost()" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold">Post Story</button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 z-[1000] flex flex-col items-end">
        <div id="aiChat" class="hidden w-72 bg-white rounded-3xl shadow-2xl border mb-4 overflow-hidden flex flex-col">
            <div class="bg-emerald-600 p-4 text-white flex justify-between items-center">
                <span class="font-bold text-sm">Maji, your Guide</span>
                <button onclick="toggleAI()">&times;</button>
            </div>
            <div id="aiResponse" class="p-4 h-64 overflow-y-auto text-sm flex flex-col gap-2">
                <div class="bg-emerald-50 p-2 rounded-lg">Hello Marvin. How can I help you heal today?</div>
            </div>
            <div class="p-3 border-t flex gap-2">
                <input id="aiInput" type="text" class="flex-1 p-2 text-sm outline-none" placeholder="Ask Maji..." onkeypress="if(event.key==='Enter') handleAISend()">
                <button onclick="handleAISend()" class="text-emerald-600"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button onclick="toggleAI()" class="w-14 h-14 bg-emerald-600 rounded-full shadow-lg flex items-center justify-center text-white text-2xl"><i class="fas fa-comment-dots"></i></button>
    </div>

    <script>
        // --- LOGIC: SPA Navigation & Login ---
        let posts = [{ id: 1, username: "MajihSoul_102", space: "Grief", need: "Listen", text: "It's hard to move on.", status: "Just Shared", time: "2h ago", comments: [] }];
        let selectedNeedStr = "";

        const getIP = async () => { try { const r = await fetch('https://api.ipify.org?format=json'); return (await r.json()).ip; } catch { return "0.0.0.0"; } };

        document.getElementById('verifyForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const status = document.getElementById('ocrStatus');
            const file = document.getElementById('idFile').files[0];

            if(!file) return alert("Upload ID first.");

            btn.disabled = true;
            status.classList.remove('hidden');

            try {
                const ip = await getIP();
                const { data: { text } } = await Tesseract.recognize(file, 'eng');
                
                // Simulate saving Marvin's data
                localStorage.setItem('majih_session', JSON.stringify({ ip, verified: true, ts: Date.now() }));
                
                document.getElementById('loginView').classList.add('hidden-view');
                document.getElementById('mainView').classList.remove('hidden-view');
                renderFeed();
                startIdleTimer();
            } catch (err) { alert("OCR Failed. Use a clearer photo."); btn.disabled = false; status.classList.add('hidden'); }
        };

        // --- LOGIC: Idle Timer & Logout ---
        let idleTimer;
        const startIdleTimer = () => {
            const reset = () => { clearTimeout(idleTimer); idleTimer = setTimeout(handleLogout, 600000); };
            window.onmousemove = reset; window.onkeypress = reset;
        };

        function handleLogout() {
            localStorage.clear();
            location.reload();
        }

        // --- LOGIC: Feed & Posts ---
        function renderFeed() {
            const feed = document.getElementById('feed');
            feed.innerHTML = posts.map(p => `
                <div class="post-card bg-white border border-emerald-100 rounded-3xl p-6 shadow-sm">
                    <div class="flex justify-between mb-4">
                        <span class="text-xs font-bold text-emerald-600">${p.username} • ${p.space}</span>
                        <span class="text-[10px] bg-emerald-50 px-2 py-1 rounded-lg">${p.status}</span>
                    </div>
                    <p class="text-emerald-800 mb-4">${p.text}</p>
                    <div class="text-[10px] uppercase font-bold text-emerald-400">Needs: ${p.need}</div>
                </div>
            `).join('');
        }

        function selectNeed(btn) {
            document.querySelectorAll('.need-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedNeedStr = btn.dataset.need;
        }

        function submitPost() {
            const text = document.getElementById('storyText').value;
            if(!text || !selectedNeedStr) return alert("Write your story and select a need.");
            posts.unshift({ id: Date.now(), username: "MajihSoul_" + Math.floor(1000+Math.random()*9000), space: document.getElementById('spaceSelect').value, need: selectedNeedStr, text, status: "Just Shared", time: "Just now", comments: [] });
            renderFeed(); closeNewPostModal();
        }

        // --- LOGIC: UI Helpers ---
        function openNewPostModal() { document.getElementById('newPostModal').classList.remove('hidden'); }
        function closeNewPostModal() { document.getElementById('newPostModal').classList.add('hidden'); }
        function toggleAI() { document.getElementById('aiChat').classList.toggle('hidden'); }
        
        function handleAISend() {
            const input = document.getElementById('aiInput');
            const box = document.getElementById('aiResponse');
            if(!input.value) return;
            box.innerHTML += `<div class="self-end bg-emerald-100 p-2 rounded-lg text-xs">${input.value}</div>`;
            const val = input.value.toLowerCase();
            input.value = '';
            setTimeout(() => {
                let r = "I'm here for you. Try asking about 'emergency contacts'.";
                if(val.includes("emergency")) r = "Befrienders Kenya: 0722 178 177";
                box.innerHTML += `<div class="bg-gray-100 p-2 rounded-lg text-xs">${r}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 600);
        }
    </script>
</body>
</html>
