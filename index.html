<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Verification • The Majih</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .logo-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-emerald-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-emerald-100">
        <div class="bg-emerald-600 p-8 text-center text-white">
            <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-2xl font-bold mx-auto mb-4 logo-font">M</div>
            <h1 class="text-2xl font-bold">Identity Verification</h1>
            <p class="text-emerald-100 text-xs mt-2 uppercase tracking-widest">Confidential & Secure</p>
        </div>

        <form id="verifyForm" class="p-8 space-y-4">
            <div class="space-y-3">
                <input type="email" id="email" placeholder="Email Address" required class="w-full p-4 bg-emerald-50 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
                <input type="tel" id="phone" placeholder="Phone (e.g., 0712345678)" required class="w-full p-4 bg-emerald-50 rounded-2xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all">
            </div>

            <div class="relative">
                <input type="file" id="idFile" accept="image/*" class="hidden" onchange="previewFile(this)">
                <label for="idFile" id="dropZone" class="flex flex-col items-center justify-center w-full h-40 border-2 border-dashed border-emerald-200 rounded-3xl cursor-pointer bg-emerald-50/30 hover:bg-emerald-50 transition-all">
                    <i class="fas fa-camera text-2xl text-emerald-400 mb-2"></i>
                    <span id="fileText" class="text-sm text-emerald-600 font-medium text-center px-4">Upload Front of National ID</span>
                </label>
            </div>

            <div id="statusMessage" class="hidden text-[11px] text-center font-semibold uppercase tracking-tighter"></div>

            <button type="submit" id="submitBtn" class="w-full py-4 bg-emerald-700 text-white rounded-2xl font-bold shadow-lg hover:bg-emerald-800 transition-all active:scale-95 flex items-center justify-center gap-3">
                <span>Verify Identity</span>
                <i class="fas fa-shield-halved"></i>
            </button>
            
            <p class="text-[10px] text-emerald-400 text-center leading-relaxed">
                By verifying, your IP and ID details are logged in our encrypted vault. Your public profile remains 100% anonymous.
            </p>
        </form>
    </div>

    <script>
        function previewFile(input) {
            const fileName = input.files[0]?.name;
            if(fileName) document.getElementById('fileText').innerText = "Selected: " + fileName;
        }

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch { return "0.0.0.0"; }
        }

        document.getElementById('verifyForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('statusMessage');
            const file = document.getElementById('idFile').files[0];

            if(!file) return alert("Please upload your ID image.");

            // UI Loading State
            btn.disabled = true;
            status.classList.remove('hidden');
            status.className = "text-emerald-600 animate-pulse text-center block text-[11px]";
            status.innerText = "Processing OCR... please wait";

            try {
                // 1. Capture IP
                const userIp = await getIP();

                // 2. Run OCR
                const { data: { text } } = await Tesseract.recognize(file, 'eng');
                console.log("Raw OCR Text:", text);

                // 3. Extract Data (Kenyan ID Specific Regex)
                // Looks for 7-8 digits for ID Number
                const idNo = text.match(/\b\d{7,8}\b/) ? text.match(/\b\d{7,8}\b/)[0] : "Unknown";
                
                // Attempts to find Names (usually follows "FULL NAMES" or "ID NUMBER")
                const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 3);
                const fullName = lines.find(l => l.includes("NAMES")) || lines[2] || "Manual Review Required";

                // 4. Create Encrypted Record (Simulated)
                const encryptedRecord = {
                    id_number: idNo,
                    real_name: fullName,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    ip: userIp,
                    timestamp: new Date().toLocaleString()
                };

                // Logic: In a real app, send 'encryptedRecord' to your database here
                console.log("STRICT PRIVACY: Data stored in hidden vault.", encryptedRecord);

                status.innerText = "Verification Successful. Redirecting...";
                status.className = "text-green-600 text-center block text-[11px] font-bold";

                setTimeout(() => {
                    window.location.href = 'home.html'; // Path to your main app
                }, 2000);

            } catch (err) {
                console.error(err);
                status.innerText = "Error reading ID. Try a clearer photo.";
                status.className = "text-red-500 text-center block text-[11px]";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
